<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart &amp; Checkout – MarketCore</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/cart.css">
</head>
<body>
<div id="navbar"></div>
<main class="cart-page">
  <div class="container" id="cart-root"></div>
</main>
<div id="footer"></div>
<script src="js/db.js"></script>
<script src="js/store.js"></script>
<script src="js/utils.js"></script>
<script>
(async () => {
  await Utils.initPage();
  let step = 'cart';
  let lastOrder = null;

  function renderAll() {
    if (step === 'confirmation' && lastOrder) { renderConfirmation(); return; }
    if (Store.state.cart.length === 0 && step === 'cart') { renderEmpty(); return; }
    renderMain();
  }

  function renderEmpty() {
    document.getElementById('cart-root').innerHTML = [
      '<div class="cart-empty">',
        '<span style="font-size:4rem">&#128717;</span>',
        '<h2>Your cart is empty</h2>',
        '<p>Looks like you haven\'t added anything yet.</p>',
        '<a href="gallery.html" class="btn-primary">Start Shopping</a>',
      '</div>',
    ].join('');
  }

  function renderConfirmation() {
    document.getElementById('cart-root').innerHTML = [
      '<div class="confirm-wrap">',
        '<div class="confirm-box">',
          '<div class="confirm-icon">&#10003;</div>',
          '<h1>Order Placed!</h1>',
          '<p>Thank you, <strong>' + Utils.esc(lastOrder.customerName) + '</strong>.<br>Order <strong>' + Utils.esc(lastOrder.id) + '</strong> has been confirmed.</p>',
          '<p class="confirm-sub">We\'ll notify you once it ships. Expected delivery: 3–5 business days.</p>',
          '<div class="confirm-actions">',
            '<a href="orders.html" class="btn-primary">View My Orders</a>',
            '<a href="gallery.html" class="btn-outline">Continue Shopping</a>',
          '</div>',
        '</div>',
      '</div>',
    ].join('');
  }

  function summaryHTML() {
    const total    = Store.cartTotal;
    const shipping = total >= 75 ? 0 : 9.99;
    const items = Store.state.cart.map(item =>
      '<div class="summary-item">' +
        '<span class="summary-name">' + Utils.esc(item.product.name) + ' <em>x' + item.quantity + '</em></span>' +
        '<span>' + Utils.formatPrice(item.product.price * item.quantity) + '</span>' +
      '</div>'
    ).join('');
    return [
      '<aside class="cart-summary">',
        '<h3 class="summary-title">Order Summary</h3>',
        items,
        '<div class="summary-divider"></div>',
        '<div class="summary-row"><span>Subtotal</span><span>' + Utils.formatPrice(total) + '</span></div>',
        '<div class="summary-row"><span>Shipping</span><span class="' + (shipping === 0 ? 'free-shipping' : '') + '">' + (shipping === 0 ? 'Free &#127881;' : Utils.formatPrice(shipping)) + '</span></div>',
        '<div class="summary-divider"></div>',
        '<div class="summary-row summary-total"><span>Total</span><span>' + Utils.formatPrice(total + shipping) + '</span></div>',
      '</aside>',
    ].join('');
  }

  function renderMain() {
    const root = document.getElementById('cart-root');
    root.innerHTML = [
      '<div class="cart-steps">',
        '<span class="cart-step ' + (step === 'cart' ? 'step-active' : '') + '">1. Cart</span>',
        '<span class="step-divider">&rsaquo;</span>',
        '<span class="cart-step ' + (step === 'checkout' ? 'step-active' : '') + '">2. Checkout</span>',
        '<span class="step-divider">&rsaquo;</span>',
        '<span class="cart-step">3. Confirmation</span>',
      '</div>',
      '<div class="cart-layout">',
        '<div class="cart-main" id="cart-main-content"></div>',
        summaryHTML(),
      '</div>',
    ].join('');

    if (step === 'cart') renderCartItems();
    else if (step === 'checkout') renderCheckoutForm();
  }

  function renderCartItems() {
    const el = document.getElementById('cart-main-content');
    const items = Store.state.cart.map(item =>
      '<div class="cart-item">' +
        '<img src="' + Utils.esc(item.product.image) + '" alt="' + Utils.esc(item.product.name) + '" class="cart-item-img">' +
        '<div class="cart-item-info">' +
          '<a href="product.html?id=' + Utils.esc(item.product.id) + '" class="cart-item-name">' + Utils.esc(item.product.name) + '</a>' +
          '<p class="cart-item-cat">' + Utils.esc(item.product.category) + '</p>' +
          '<p class="cart-item-price">' + Utils.formatPrice(item.product.price) + ' each</p>' +
        '</div>' +
        '<div class="cart-item-controls">' +
          '<div class="qty-control">' +
            '<button class="qty-btn" data-id="' + Utils.esc(item.product.id) + '" data-delta="-1">&minus;</button>' +
            '<span class="qty-val">' + item.quantity + '</span>' +
            '<button class="qty-btn" data-id="' + Utils.esc(item.product.id) + '" data-delta="1">+</button>' +
          '</div>' +
          '<p class="cart-item-total">' + Utils.formatPrice(item.product.price * item.quantity) + '</p>' +
          '<button class="remove-btn" data-remove="' + Utils.esc(item.product.id) + '" title="Remove item">&#128465;</button>' +
        '</div>' +
      '</div>'
    ).join('');

    el.innerHTML = [
      '<h2 class="cart-section-title">Shopping Cart (' + Store.cartCount + ' item' + (Store.cartCount !== 1 ? 's' : '') + ')</h2>',
      '<div class="cart-items">' + items + '</div>',
      '<button class="btn-primary" id="proceed-btn" style="margin-top:var(--space-6)">Proceed to Checkout &rarr;</button>',
    ].join('');

    el.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pid  = btn.dataset.id;
        const item = Store.state.cart.find(i => String(i.product.id) === String(pid));
        if (item) Store.updateCartQty(pid, item.quantity + parseInt(btn.dataset.delta));
        renderAll();
      });
    });
    el.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        Store.removeFromCart(btn.dataset.remove);
        renderAll();
      });
    });
    document.getElementById('proceed-btn').addEventListener('click', () => {
      step = 'checkout';
      renderAll();
    });
  }

  function renderCheckoutForm() {
    const user = Store.state.user;
    const el   = document.getElementById('cart-main-content');
    el.innerHTML = [
      '<form id="checkout-form" class="checkout-form" novalidate>',
        '<h2 class="cart-section-title">Shipping Information</h2>',
        '<div class="form-grid">',
          '<div class="form-group"><label>Full Name *</label><input name="fullName" placeholder="Alice Johnson" required value="' + Utils.esc(user ? user.name : '') + '"></div>',
          '<div class="form-group"><label>Email *</label><input name="email" type="email" placeholder="alice@example.com" required value="' + Utils.esc(user ? user.email : '') + '"></div>',
          '<div class="form-group form-full"><label>Street Address *</label><input name="street" placeholder="123 Main St" required></div>',
          '<div class="form-group"><label>City *</label><input name="city" placeholder="Portland" required></div>',
          '<div class="form-group"><label>State *</label><input name="state" placeholder="OR" required></div>',
          '<div class="form-group"><label>ZIP Code *</label><input name="zip" placeholder="97201" required></div>',
          '<div class="form-group"><label>Country *</label><input name="country" placeholder="US" required value="US"></div>',
        '</div>',
        '<h2 class="cart-section-title" style="margin-top:var(--space-8)">&#128274; Payment Details</h2>',
        '<p class="demo-note">&#9888; Demo mode — simulated payment. No real charges will be made.</p>',
        '<div class="form-grid">',
          '<div class="form-group form-full"><label>Card Number *</label><input name="cardNumber" id="card-number" placeholder="4242 4242 4242 4242" maxlength="19" required autocomplete="cc-number"></div>',
          '<div class="form-group"><label>Expiry (MM/YY) *</label><input name="cardExpiry" id="card-expiry" placeholder="MM/YY" maxlength="5" required autocomplete="cc-exp"></div>',
          '<div class="form-group"><label>CVV *</label><input name="cardCvv" placeholder="123" maxlength="4" required autocomplete="cc-csc" type="password"></div>',
        '</div>',
        '<div id="checkout-error" class="auth-error hidden"></div>',
        '<div class="checkout-actions">',
          '<button type="button" class="btn-outline" id="back-to-cart">&#8592; Back to Cart</button>',
          '<button type="submit" class="btn-primary" id="place-order-btn">Place Order &rarr;</button>',
        '</div>',
      '</form>',
    ].join('');

    // Card number auto-format (spaces every 4 digits)
    document.getElementById('card-number').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').substring(0, 16);
      this.value = v.replace(/(\d{4})(?=\d)/g, '$1 ');
    });
    // Expiry auto-format (MM/YY)
    document.getElementById('card-expiry').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').substring(0, 4);
      if (v.length >= 3) v = v.substring(0, 2) + '/' + v.substring(2);
      this.value = v;
    });

    document.getElementById('back-to-cart').addEventListener('click', () => { step = 'cart'; renderAll(); });

    document.getElementById('checkout-form').addEventListener('submit', e => {
      e.preventDefault();
      const errEl = document.getElementById('checkout-error');

      // Manual validation
      const fd   = new FormData(e.target);
      const data = Object.fromEntries(fd.entries());
      const required = ['fullName', 'email', 'street', 'city', 'state', 'zip', 'country', 'cardNumber', 'cardExpiry', 'cardCvv'];
      const missing  = required.filter(f => !data[f] || !data[f].trim());
      if (missing.length > 0) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.classList.remove('hidden');
        return;
      }
      errEl.classList.add('hidden');

      const btn = document.getElementById('place-order-btn');
      btn.disabled = true;
      btn.textContent = 'Placing order...';

      const order = {
        id:              'ORD-' + Date.now(),
        customerId:      Store.state.user ? Store.state.user.id : 'guest',
        customerName:    data.fullName.trim(),
        customerEmail:   data.email.trim(),
        items: Store.state.cart.map(item => ({
          productId:   item.product.id,
          productName: item.product.name,
          price:       item.product.price,
          quantity:    item.quantity,
          image:       item.product.image,
        })),
        total:           Store.cartTotal,
        status:          'Pending',
        createdAt:       new Date().toISOString(),
        shippingAddress: {
          fullName: data.fullName.trim(),
          street:   data.street.trim(),
          city:     data.city.trim(),
          state:    data.state.trim(),
          zip:      data.zip.trim(),
          country:  data.country.trim(),
        },
      };

      DB.createOrder(order);
      Store.clearCart();
      lastOrder = order;
      step = 'confirmation';
      renderAll();
    });
  }

  renderAll();
})();
</script>
</body>
</html>
