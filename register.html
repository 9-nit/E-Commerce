<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – MarketCore</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
<div id="navbar"></div>
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <a href="index.html" class="auth-logo">Market<span>Core</span></a>
      <h1>Create account</h1>
      <p>Join MarketCore to start shopping</p>
    </div>
    <div class="auth-error hidden" id="auth-error"></div>
    <form id="register-form" class="auth-form" novalidate>
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input id="reg-name" type="text" name="name" placeholder="Alice Johnson" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="reg-email">Email address</label>
        <input id="reg-email" type="email" name="email" placeholder="alice@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">Password <span style="font-weight:400;color:var(--color-text-muted)">(min 6 characters)</span></label>
        <input id="reg-password" type="password" name="password" placeholder="Choose a strong password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="auth-submit" id="register-btn">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>
<div id="footer"></div>
<script src="js/db.js"></script>
<script src="js/store.js"></script>
<script src="js/utils.js"></script>
<script>
(async () => {
  await Utils.initPage();

  // Already logged in
  if (Store.state.user) { window.location.href = 'index.html'; return; }

  const form   = document.getElementById('register-form');
  const errEl  = document.getElementById('auth-error');
  const btn    = document.getElementById('register-btn');

  form.addEventListener('submit', e => {
    e.preventDefault();
    errEl.classList.add('hidden');

    const name     = form.name.value.trim();
    const email    = form.email.value.trim();
    const password = form.password.value;

    // Validation
    if (!name) {
      errEl.textContent = 'Please enter your full name.';
      errEl.classList.remove('hidden'); return;
    }
    if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
      errEl.textContent = 'Please enter a valid email address.';
      errEl.classList.remove('hidden'); return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.classList.remove('hidden'); return;
    }
    if (DB.userExists(email)) {
      errEl.textContent = 'An account with this email already exists.';
      errEl.classList.remove('hidden'); return;
    }

    btn.disabled    = true;
    btn.textContent = 'Creating account...';

    const newUser = {
      id:       'u-' + Date.now(),
      name:     name,
      email:    email,
      password: password,
      role:     'customer',
      createdAt: new Date().toISOString(),
    };

    DB.createUser(newUser);
    Store.login({ id: newUser.id, name: newUser.name, email: newUser.email, role: newUser.role });
    Utils.toast('Welcome to MarketCore, ' + name.split(' ')[0] + '!', 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 600);
  });
})();
</script>
</body>
</html>
